services:
  frp-init:
    image: alpine:3.20
    container_name: frp-init
    user: "0:0"
    volumes:
      - ./:/work
    command:
      - sh
      - -eux
      - -c
      - >-
        mkdir -p /work;
        if [ ! -f /work/frpc.toml ]; then
          printf '%s\n' 'serverAddr = "127.0.0.1"' 'serverPort = 7000' '' 'loginFailExit = false' '' '[auth]' 'method = "token"' 'token = ""' '' '[webServer]' 'addr = "0.0.0.0"' 'port = 7400' 'user = "admin"' 'password = "admin"' > /work/frpc.toml;
        fi;
        test -f /work/frpc.toml;
        ls -la /work
    restart: "no"

  frpc-gui:
    image: ghcr.io/dukaworks/frpc-gui:latest
    container_name: frpc-gui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRPC_GUI_MODE=local
      # Path to the shared frpc configuration file
      - FRPC_CONFIG_PATH=/etc/frpc.toml
      # Frpc webServer API configuration for reload/status operations
      - FRPC_WEB_SERVER_ADDR=frpc
      - FRPC_WEB_SERVER_PORT=7400
    volumes:
      # Shared volume for configuration file access
      - ./frpc.toml:/etc/frpc.toml
    restart: unless-stopped
    depends_on:
      - frpc

  frpc:
    image: fatedier/frpc:v0.67.0
    container_name: frpc
    volumes:
      - ./frpc.toml:/etc/frpc.toml
    command: ["-c", "/etc/frpc.toml"]
    restart: unless-stopped
    depends_on:
      frp-init:
        condition: service_completed_successfully
