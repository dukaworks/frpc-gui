services:
  frp-init:
    image: alpine:3.20
    container_name: frp-init
    user: "0:0"
    volumes:
      - ./frp:/etc/frp
    entrypoint: ["sh", "-c"]
    command: |
      set -e
      mkdir -p /etc/frp
      if [ ! -f /etc/frp/frpc.toml ]; then
        printf '%s\n' \
          'serverAddr = "127.0.0.1"' \
          'serverPort = 7000' \
          '' \
          '[auth]' \
          'token = ""' \
          '' \
          '[webServer]' \
          'addr = "0.0.0.0"' \
          'port = 7400' \
          'user = "admin"' \
          'password = "admin"' \
          > /etc/frp/frpc.toml
      fi
    restart: "no"

  frpc-gui:
    image: ghcr.io/dukaworks/frpc-gui:latest
    container_name: frpc-gui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRPC_GUI_MODE=local
      # Path to the shared frpc configuration file
      - FRPC_CONFIG_PATH=/etc/frp/frpc.toml
      # Frpc webServer API configuration for reload/status operations
      - FRPC_WEB_SERVER_ADDR=frpc
      - FRPC_WEB_SERVER_PORT=7400
    volumes:
      # Shared volume for configuration file access
      - ./frp:/etc/frp
    restart: unless-stopped
    depends_on:
      - frpc

  frpc:
    image: fatedier/frp:latest
    container_name: frpc
    volumes:
      # Shared volume for configuration file access
      - ./frp:/etc/frp
    entrypoint: ["/frpc"]
    command: ["-c", "/etc/frp/frpc.toml"]
    restart: unless-stopped
    depends_on:
      - frp-init
