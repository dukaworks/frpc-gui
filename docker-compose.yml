version: '3.8'

services:
  frpc-gui:
    # Use the official image from GHCR
    image: ghcr.io/dukaworks/frpc-gui:latest
    container_name: frpc-gui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Enable Native Local Mode (no SSH needed)
      # - FRPC_GUI_MODE=local
      # - FRPC_CONFIG_PATH=/etc/frp/frpc.toml
      # Mount docker.sock for local Docker container discovery:
      # - /var/run/docker.sock:/var/run/docker.sock
    # volumes:
      # Local config file (for local mode):
      # - ./frpc.toml:/etc/frp/frpc.toml
    restart: unless-stopped
