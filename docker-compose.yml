version: '3.8'

services:
  frpc-gui:
    build: .
    image: frpc-gui:latest
    container_name: frpc-gui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    # volumes:
      # If you want to manage a local frpc.toml file on your host machine:
      # - ./frpc.toml:/etc/frp/frpc.toml
    restart: unless-stopped
