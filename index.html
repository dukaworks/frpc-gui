<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRPC Manager</title>
  </head>
  <body>
    <div id="root" style="min-height: 100vh;">
      <div id="boot-splash" style="display: none; position: fixed; inset: 0; align-items: center; justify-content: center; padding: 24px; background: #0b1020; color: #e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Apple Color Emoji', 'Segoe UI Emoji';">
        <div style="width: min(520px, 100%); border: 1px solid rgba(148, 163, 184, .25); border-radius: 12px; padding: 20px 18px; background: rgba(17, 24, 39, .65); backdrop-filter: blur(6px); box-shadow: 0 18px 40px rgba(0,0,0,.35);">
          <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px;">
            <div style="font-size: 14px; font-weight: 650; letter-spacing: .2px;">FRPC Manager</div>
            <div style="font-size: 12px; opacity: .8;">正在加载…</div>
          </div>
          <div style="height: 8px; border-radius: 999px; background: rgba(148, 163, 184, .2); overflow: hidden;">
            <div style="height: 100%; width: 40%; background: linear-gradient(90deg, rgba(34,197,94,.25), rgba(34,197,94,.9), rgba(34,197,94,.25)); animation: bootbar 1.1s ease-in-out infinite;"></div>
          </div>
          <div id="boot-hint" style="display: none; margin-top: 12px; font-size: 12px; line-height: 1.5; opacity: .85;">
            如果一直停在这里，说明前端脚本没跑起来或运行时报错。请打开浏览器控制台（F12）看报错信息。
          </div>
        </div>
      </div>
    </div>
    <style>
      @keyframes bootbar {
        0% { transform: translateX(-60%); }
        100% { transform: translateX(260%); }
      }
      @media (prefers-color-scheme: light) {
        #boot-splash { background: #f8fafc; color: #0f172a; }
        #boot-splash > div { background: rgba(255,255,255,.9); border-color: rgba(15, 23, 42, .1); box-shadow: 0 18px 40px rgba(15,23,42,.12); }
        #boot-splash > div > div + div { background: rgba(15, 23, 42, .08); }
      }
    </style>
    <script>
      (function () {
        var shown = false;
        var splash = document.getElementById('boot-splash');
        if (!splash) return;
        setTimeout(function () {
          var root = document.getElementById('root');
          if (!root || root.childElementCount !== 1) return;
          splash.style.display = 'flex';
          shown = true;
        }, 200);
        setTimeout(function () {
          if (!shown) return;
          var hint = document.getElementById('boot-hint');
          if (hint) hint.style.display = 'block';
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
